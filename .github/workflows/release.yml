name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g. v0.1.0)'
        required: true

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: cmd
        run: scripts\build_windows-x64.bat --clean --config Release

      - name: Package
        shell: cmd
        run: |
          mkdir package
          copy build\Release\ammio.exe package\
          tar -acf ammio-windows-x64.zip -C package .

      - uses: actions/upload-artifact@v4
        with:
          name: ammio-windows-x64
          path: ammio-windows-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ammio-windows-x64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ github.event.inputs.version }} \
            ammio-windows-x64.zip \
            --title "Release ${{ github.event.inputs.version }}" \
            --generate-notes
