name: release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-2022
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Build
        shell: cmd
        run: scripts\build_windows-x64.bat --clean --config Release

      - name: Package
        shell: cmd
        run: |
          mkdir package
          copy build\Release\ammio.exe package\
          tar -acf ammio-windows-x64.zip -C package .

      - uses: actions/upload-artifact@v4
        with:
          name: ammio-windows-x64
          path: ammio-windows-x64.zip

  release:
    needs: build-windows
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: ammio-windows-x64

      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          gh release create ${{ github.ref_name }} \
            ammio-windows-x64.zip \
            --title "Release ${{ github.ref_name }}" \
            --generate-notes
